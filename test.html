<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Organisation | Home</title>
    <style>
        /* ZÁKLADNÉ NASTAVENIA */
        body {
            margin: 0;
            padding: 0;
            font-family: "Times New Roman", Times, serif;
            background-color: #f4f1e6;
            color: #1a1a1a;
        }

        /* HERO SEKCIA - TERAZ NA CELÚ OBRAZOVKU */
        .hero-section {
            position: relative;
            height: 100vh; /* Zväčšené na celú výšku displeja */
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }

        .background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
            filter: brightness(0.6); /* Trochu tmavšie, aby lepšie vynikol text */
        }

        header {
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 30px 0;
            z-index: 10;
        }

        .nav-bar {
            background-color: rgba(255, 255, 255, 0.9);
            padding: 10px 40px;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .nav-bar ul {
            list-style: none;
            display: flex;
            gap: 30px;
            margin: 0;
            padding: 0;
        }

        .nav-bar li a {
            text-decoration: none;
            color: black;
            font-family: Arial, sans-serif;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1.5px;
        }

        .hero-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            z-index: 1;
        }

        h1 {
            font-size: clamp(40px, 8vw, 70px);
            text-transform: uppercase;
            letter-spacing: 5px;
            margin: 0;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
        }

        .subtitle {
            font-style: italic;
            font-size: 24px;
            margin-top: 20px;
            opacity: 0.9;
        }

        /* SEKCIA SLUŽIEB */
        .container {
            padding: 80px 5%;
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
        }

        h2 {
            font-size: 40px;
            text-transform: uppercase;
            margin-bottom: 50px;
            font-weight: normal;
            letter-spacing: 3px;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        /* KARTY AKO ČISTÉ OBRAZOVÉ TLAČIDLÁ */
        .service-button {
            position: relative;
            border: none;
            padding: 0;
            background: none;
            cursor: pointer;
            overflow: hidden;
            border-radius: 25px;
            height: 450px;
            width: 100%;
            display: block;
            text-decoration: none;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .service-button img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.5s ease, filter 0.3s ease;
        }

        .service-button:hover img {
            transform: scale(1.08);
            filter: brightness(0.7);
        }

        .service-button h3 {
            position: absolute;
            bottom: 30px;
            left: 30px;
            margin: 0;
            color: white;
            font-size: 28px;
            font-family: "Garamond", serif;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            font-weight: lighter;
        }

        /* FOOTER */
        .footer {
            background-color: #E6E2D3;
            text-align: center;
            padding: 40px 0;
            margin-top: 60px;
            border-radius: 30px 30px 0 0;
        }

        @media (max-width: 768px) {
            h1 { font-size: 35px; }
            .service-button { height: 350px; }
        }
    </style>
</head>
<body>

    <section class="hero-section">
        <img src="Images/Background.png" alt="Background" class="background">

        <header>
            <nav class="nav-bar">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="rezervations.html">Rezervations</a></li>
                    <li><a href="services.html">Services</a></li>
                    <li><a href="gallery.html">Gallery</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
        </header>

        <div class="hero-content">
            <h1>Event Organisation</h1>
            <p class="subtitle">Book the best events for your next gathering!</p>
        </div>
    </section>

    <main class="container">
        <h2>Our Services</h2>
        
        <div class="services-grid">
            
            <a href="weddings.html" class="service-button">
                <img src="Images/Weddings.png" alt="Wedding">
                <h3>Weddings</h3>
            </a>

            <a href="graduationparties.html" class="service-button">
                <img src="Images/GraduationParties.png" alt="Graduation Party">
                <h3>Graduations</h3>
            </a>

            <a href="parties.html" class="service-button">
                <img src="Images/Parties.png" alt="Party">
                <h3>Parties</h3>
            </a>

        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 Event Organisation. All rights reserved.</p>
    </footer>

</body>
</html>
