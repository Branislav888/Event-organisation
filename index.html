<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Organisation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <nav class="nav-bar">
            <ul>
                <li>O nás</li>
                <li>Služby</li>
                <li>Členstvo</li>
                <li>Galéria</li>
                <li>Kontakt</li>
            </ul>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-content">
            <span class="est">EST. 1888</span>
            <h1>Event Organisation</h1>
            <p>Book the best events for your next gathering!</p>
            <button class="cta-button">Get Started</button>
        </div>
    </section>

    <section class="services-section">
        <div class="container">
            <h2>Our Services</h2>
            <p class="subtitle">Choose the perfect event for your needs!</p>
            
            <div class="services-grid">
                <div class="service-card">
                    <img src="Images/Weddings.png" alt="Wedding">
                    <h3>Weddings</h3>
                    <span class="arrow">→</span>
                </div>

                <div class="service-card">
                    <img src="Images/GraduationParties.png" alt="Graduation Party">
                    <h3>Graduation Parties</h3>
                    <span class="arrow">→</span>
                </div>

                <div class="service-card">
                    <img src="Images/Parties.png" alt="Party">
                    <h3>Parties</h3>
                    <span class="arrow">→</span>
                </div>
            </div>
        </div>
    </section>

</body>
</html>
