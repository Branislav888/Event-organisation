<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservations & Party Planner | Event Organisation</title>
    <link rel="stylesheet" href="rezervations.css">
</head>

<body>

    <section class="hero-section">
        <img src="Images/Background.png" alt="Background" class="background">
        <header>
            <nav class="nav-bar">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="rezervations.html" style="font-weight: bold;">Reservations</a></li>
                    <li><a href="services.html">Services</a></li>
                    <li><a href="gallery.html">Gallery</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
        </header>
        <div class="hero-content">
            <h1>Reservations & Party</h1>
            <p class="subtitle">Parking + celebrate with us</p>
        </div>
    </section>

    <main class="contact-container">
        <div class="contact-grid">
            <div class="contact-card">
                <h2>Parking Reservation</h2>
                <form id="parkingForm" class="contact-form">
                    <div class="form-row">
                        <input type="text" id="parkName" placeholder="Name" required>
                        <input type="text" id="parkLastName" placeholder="Last name" required>
                    </div>
                    <input type="email" id="parkEmail" placeholder="Email@" required>
                    <input type="tel" id="parkPhone" placeholder="Phone number" required>
                    <input type="text" id="parkPlate" placeholder="Number plate (e.g. BL-123XY)" required>
                    <div class="form-row">
                        <input type="date" id="parkDate" required>
                        <input type="time" id="parkTime" required>
                    </div>
                    <select id="parkSpaces">
                        <option value="1">1 parking spot</option>
                        <option value="2">2 parking spots</option>
                        <option value="3">3 parking spots</option>
                    </select>
                    <button type="submit">Reserve Parking</button>
                    <div id="parkingMessage" class="form-message"></div>
                </form>
            </div>

            <div class="contact-card">
                <h2>Party & Catering</h2>
                <form id="partyForm" class="contact-form">
                    <input type="text" id="eventName" placeholder="Event name (e.g. Birthday, Wedding)" required>
                    <select id="eventType" required>
                        <option value="">-- Type of celebration --</option>
                        <option value="birthday">Birthday</option>
                        <option value="wedding">Wedding</option>
                        <option value="corporate">Corporate event</option>
                        <option value="anniversary">Anniversary</option>
                        <option value="other">Other</option>
                    </select>
                    <div class="form-row">
                        <input type="number" id="guests" placeholder="Number of guests" min="1" required>
                        <input type="number" id="foodPortions" placeholder="Meal portions" min="1">
                    </div>
                    <textarea id="dietary" rows="2" placeholder="Allergies / dietary restrictions (e.g. gluten-free, vegan, nuts)"></textarea>
                    <select id="mainDish">
                        <option value="">-- Preferred main dish --</option>
                        <option value="chicken">Grilled chicken</option>
                        <option value="beef">Beef steak</option>
                        <option value="veggie">Vegetarian pasta</option>
                        <option value="fish">Salmon fillet</option>
                        <option value="vegan">Vegan bowl</option>
                    </select>
                    <textarea id="specialRequests" rows="2" placeholder="Additional requests (decorations, drinks, cake...)"></textarea>
                    <button type="submit">Submit Party Plan</button>
                    <div id="partyMessage" class="form-message"></div>
                </form>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 Event Organisation. All rights reserved.</p>
    </footer>

    <script src="rezervations.js"></script>
</body>

</html>
